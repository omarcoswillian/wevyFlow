<style>
.pq{padding:80px 0;background:#161616}
.pq .container{max-width:1100px;margin:0 auto;padding:0 80px}
.pq-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:20px;background:rgba(255,92,0,0.12);border:1px solid rgba(255,92,0,0.2);margin-bottom:16px}
.pq-badge span{font-size:12px;font-weight:600;color:#FF5C00;text-transform:uppercase;letter-spacing:0.06em}
.pq h2{font-family:'Montserrat',sans-serif;font-size:28px;font-weight:700;color:#F5F5F5;line-height:1.2;margin-bottom:16px}
.pq p.sub{font-size:16px;color:#999;line-height:1.7;margin-bottom:48px;max-width:600px}
.pq-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.pq-card{background:#1E1E1E;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:28px;transition:all 0.2s ease}
.pq-card:hover{border-color:rgba(255,92,0,0.3);transform:translateY(-2px)}
.pq-icon{width:48px;height:48px;border-radius:10px;background:rgba(255,92,0,0.1);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.pq-icon svg{width:22px;height:22px;color:#FF5C00}
.pq-card h3{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:600;color:#F5F5F5;margin-bottom:8px;line-height:1.35}
.pq-card p{font-size:14px;color:#999;line-height:1.6}
@media(max-width:768px){.pq .container{padding:0 20px}.pq{padding:56px 0}.pq-grid{grid-template-columns:1fr}.pq h2{font-size:22px}}
</style>
